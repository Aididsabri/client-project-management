<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="src/style.css" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Client Project Management</title>
  </head>
  <body>
    <div class="sidebar"></div>
    <div class="page-content">
      <section class="clients container p-5">
        <h1 class="">Client Project Management</h1>

        <!-- Filter Client Section -->
        <div class="container space-y-3">
          <div class="flex items-center space-x-2">
            <input
              type="text"
              placeholder="Filter clients"
              class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:outline-none"
            />
            <button
              type="button"
              class="clients__filter cursor-pointer px-6 py-2 bg-purple-500 text-white font-semibold rounded-lg hover:bg-purple-700 transition-colors"
            >
              Filter
            </button>
          </div>
        </div>

        <!-- add client modal -->
        <button
          type="button"
          id="modalBtn"
          class="fixed bottom-10 right-15 cursor-pointer px-6 py-2 bg-purple-500 text-white font-semibold rounded-lg hover:bg-purple-700 transition-colors"
        >
          Add Client
        </button>

        <!-- modal content -->
        <div id="modalContent" class="modal">
          <div class="modal-content">
            <span class="close">&times;</span>
              <div class="py-5">Please Enter new client's name</div>
            <div class="flex items-center space-x-2 pb-4">
              <input
                type="text"
                placeholder="Add New Clients"
                class="clients__input w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:outline-none"
              />
              <button
                type="button"
                class="clients__add cursor-pointer px-6 py-2 bg-purple-500 text-white font-semibold rounded-lg hover:bg-purple-700 transition-colors"
              >
                Add
              </button>
            </div>
          </div>
        </div>

        <!-- Client Lists render here -->
        <ul class="clients__list">

        </ul>
      </section>
    </div>
  </body>
</html>

<script type="module" src="src/main.js"></script>
