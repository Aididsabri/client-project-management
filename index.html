<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="src/style.css" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Client Project Management</title>
  </head>
  <body>
    <section class="clients container p-5">
      <h1 class="">Client Project Management</h1>
      <div class="flex items-center space-x-2">
        <input
          type="text"
          placeholder="Add New Clients"
          class="clients__input w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:outline-none"
        />
        <button
          type="button"
          onclick="addClient()"
          class="clients__add cursor-pointer px-6 py-2 bg-purple-500 text-white font-semibold rounded-lg hover:bg-purple-700 transition-colors"
        >
          Add
        </button>
      </div>

      <ul class="clients__list">
        
      </ul>
    </section>
  </body>
</html>

<script src="src/main.js"></script>
